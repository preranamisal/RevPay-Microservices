name: RevPay CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-south-1

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test All Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Eureka Server
        run: mvn clean package -DskipTests -pl eureka-server -am

      - name: Build API Gateway
        run: mvn clean package -DskipTests -pl api-gateway -am

      - name: Build & Test User Service
        run: mvn clean verify -pl user-service -am

      - name: Build & Test Wallet Service
        run: mvn clean verify -pl wallet-service -am

      - name: Build & Test Transaction Service
        run: mvn clean verify -pl transaction-service -am

      - name: Build Invoice Service
        run: mvn clean package -DskipTests -pl invoice-service -am

      - name: Build Loan Service
        run: mvn clean package -DskipTests -pl loan-service -am

      - name: Build Notification Service
        run: mvn clean package -DskipTests -pl notification-service -am

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

  # ── Docker Build & Push ──────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - wallet-service
          - transaction-service
          - invoice-service
          - loan-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -pl ${{ matrix.service }} -am

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/revpay-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/revpay-${{ matrix.service }}:${{ github.sha }}

  # ── Build Frontend ───────────────────────────────────────────────────────────
  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: revpay-frontend/package-lock.json

      - name: Install dependencies
        working-directory: revpay-frontend
        run: npm ci

      - name: Build Angular app
        working-directory: revpay-frontend
        run: npm run build -- --configuration=production

      - name: Build and push frontend Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./revpay-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/revpay-frontend:latest

  # ── Deploy to AWS EC2 ────────────────────────────────────────────────────────
  deploy-to-aws:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [docker-build-push, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/revpay
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
            echo "RevPay deployed successfully at $(date)"

      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.EC2_HOST }}:8761/actuator/health || echo "Eureka health check pending"
          echo "Deployment complete"
