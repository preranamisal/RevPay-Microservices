server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**

        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/wallets/**, /api/payment-methods/**
          filters:
            - AuthenticationFilter

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transactions/**
          filters:
            - AuthenticationFilter

        - id: invoice-service
          uri: lb://invoice-service
          predicates:
            - Path=/api/invoices/**
          filters:
            - AuthenticationFilter

        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/loans/**
          filters:
            - AuthenticationFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: revpay-secret-key-for-jwt-token-generation-2024-secure

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    com.revpay: DEBUG
    org.springframework.cloud.gateway: DEBUG
  file:
    name: logs/api-gateway.log
