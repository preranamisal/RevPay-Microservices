server:
  port: 8085
spring:
  application:
    name: loan-service
  datasource:
    url: jdbc:mysql://localhost:3306/revpay_loans?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: pass@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    com.revpay: DEBUG
  file:
    name: logs/loan-service.log


